<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 860 360"
     width="860" height="360"
     role="img" aria-label="Skill Bubble visualization">
  <defs>
    <radialGradient id="g0" cx="0.95" cy="0.75" r="0.8"><stop offset="0%" stop-color="#4ecdc4cc"/><stop offset="60%" stop-color="#7c6af788"/><stop offset="100%" stop-color="#4ecdc433"/></radialGradient>
    <filter id="glow-loaded" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-idle" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .bubble-loaded { animation: pulse 3s ease-in-out infinite; }
      #bubble-0 { animation-delay: 0.0s; }
@keyframes pulse {
  0%, 100% { opacity: 0.92; transform-origin: center; transform: scale(1); }
  50%       { opacity: 1.00; transform: scale(1.035); }
}
.label { font-family: 'SF Mono', 'Fira Code', monospace; }

    </style>
  </defs>
  <rect width="860" height="360" rx="12" fill="#0d0d14"/>
  <g id="bubble-0" class="bubble-loaded">
    <circle cx="520.9" cy="107.8" r="90" fill="url(#g0)" stroke="#4ecdc488" stroke-width="1" filter="url(#glow-loaded)"/>
    <circle cx="495.7" cy="82.6" r="16.2" fill="#ffffff22"/>
    <text x="520.9" y="107.8" text-anchor="middle" dominant-baseline="middle" class="label" font-size="13" font-weight="600" fill="#e8fffe"><title>skill-bubble — Local skill manager REST API (uses: 1)</title>skill-bubble</text>
    <circle cx="579.4" cy="49.3" r="9" fill="#7c6af7"/>
    <text x="579.4" y="49.3" text-anchor="middle" dominant-baseline="middle" class="label" font-size="8" font-weight="700" fill="#fff">1</text>
  </g>
<g font-family="SF Mono, Fira Code, monospace" font-size="11" fill="#6b6b88">
  <circle cx="21" cy="313" r="5" fill="#4ecdc4" opacity=".8"/>
  <text x="32" y="317">active</text>
  <circle cx="81" cy="313" r="5" fill="#3a3a52"/>
  <text x="92" y="317">idle</text>
  <text x="16" y="334" fill="#3a3a66">─────────────────</text>
  <text x="16" y="350">
    <tspan fill="#e8e8f0">1</tspan> skills ·
    <tspan fill="#4ecdc4">1</tspan> loaded ·
    <tspan fill="#f9c74f">1</tspan> total uses
  </text>
</g>
</svg>