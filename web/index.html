<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Skill Bubble</title>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --accent: #7c6af7;
      --accent2: #4ecdc4;
      --accent3: #ff6b9d;
      --text: #e8e8f0;
      --text-dim: #6b6b88;
      --loaded: #4ecdc4;
      --idle: #3a3a52;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ffffff08;
      background: #0d0d1499;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .05em;
      color: var(--accent);
    }

    header h1 span { color: var(--text-dim); font-weight: 400; }

    .stats {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stats b { color: var(--text); }

    .last-updated {
      font-size: 11px;
      color: var(--text-dim);
      opacity: .6;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid #ffffff15;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
      max-width: 260px;
      z-index: 100;
      box-shadow: 0 8px 32px #00000060;
    }

    #tooltip.show { opacity: 1; }
    #tooltip .t-name { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    #tooltip .t-dim { color: var(--text-dim); }
    #tooltip .t-tag {
      display: inline-block;
      background: #ffffff10;
      border-radius: 4px;
      padding: 1px 6px;
      margin: 2px 2px 0 0;
      font-size: 11px;
    }
    #tooltip .t-loaded { color: var(--loaded); font-size: 11px; }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Controls */
    .controls {
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge {
      background: #7c6af722;
      border: 1px solid #7c6af744;
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .empty-state .big { font-size: 48px; opacity: .3; }
    .empty-state code {
      background: #ffffff08;
      padding: 4px 10px;
      border-radius: 6px;
      color: var(--accent);
    }

    /* Watermark */
    .watermark {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 11px;
      color: var(--text-dim);
      opacity: .4;
      text-decoration: none;
    }
    .watermark:hover { opacity: .8; }

    /* Panel toggle buttons */
    .toggle-btns {
      display: flex;
      gap: 6px;
    }
    .toggle-btn {
      background: #ffffff08;
      border: 1px solid #ffffff15;
      color: var(--text-dim);
      padding: 5px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .toggle-btn.active {
      background: #7c6af722;
      border-color: #7c6af744;
      color: var(--accent);
    }
    .toggle-btn:hover:not(.active) {
      background: #ffffff12;
      color: var(--text);
    }

    /* Discover panel */
    #discover-panel {
      display: none;
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg);
    }
    #discover-loading {
      color: var(--text-dim);
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
    }
    #discover-error {
      display: none;
      color: #ff6b9d;
      font-size: 13px;
      padding: 20px 0;
    }
    #discover-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .skill-card {
      background: var(--surface);
      border: 1px solid #ffffff10;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skill-card .card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }
    .skill-card .card-hub {
      font-size: 11px;
      color: var(--text-dim);
    }
    .skill-card .card-desc {
      font-size: 12px;
      color: var(--text);
      flex: 1;
    }
    .skill-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .card-tag {
      background: #ffffff10;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .install-btn {
      background: #7c6af722;
      border: 1px solid #7c6af744;
      color: var(--accent);
      padding: 5px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .install-btn:hover:not(:disabled) { background: #7c6af744; }
    .install-btn:disabled {
      opacity: .5;
      cursor: default;
    }
    .install-btn.installed {
      background: #4ecdc422;
      border-color: #4ecdc444;
      color: var(--loaded);
      cursor: default;
    }
  </style>
</head>
<body>

<header>
  <h1>✦ Skill Bubble <span>/ visual skill manager</span></h1>
  <div class="stats">
    <span>Total: <b id="stat-total">0</b></span>
    <span>Loaded: <b id="stat-loaded" style="color:var(--loaded)">0</b></span>
    <span>Uses: <b id="stat-uses">0</b></span>
    <span class="last-updated" id="last-updated"></span>
  </div>
  <div class="toggle-btns" id="panel-toggle" style="display:none">
    <button id="btn-my" class="toggle-btn active" onclick="showPanel('my')">My Skills</button>
    <button id="btn-discover" class="toggle-btn" onclick="showPanel('discover')">Discover</button>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--loaded);opacity:.8"></div>
      <span>Active / loaded</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--idle)"></div>
      <span>Idle</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent);opacity:.6"></div>
      <span>Bubble size = usage</span>
    </div>
  </div>

  <div class="controls">
    <span class="badge">📊 GitHub Pages · static snapshot</span>
  </div>

  <div id="empty" class="empty-state" style="display:none">
    <div class="big">◎</div>
    <div>No skills in snapshot.</div>
    <div>Run <code>sb export</code> then push to update.</div>
  </div>

  <a class="watermark" href="https://github.com/clveryang/Skill-Bubble" target="_blank">
    github.com/clveryang/Skill-Bubble
  </a>

  <div id="discover-panel">
    <div id="discover-loading">Loading hub skills…</div>
    <div id="discover-error"></div>
    <div id="discover-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── Physics ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H, bubbles = [], hovered = null;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  if (bubbles.length) initPositions();
}
window.addEventListener('resize', resize);

// ── Data ──────────────────────────────────────────────────────────────────────
// Tries data.json first (static/GitHub Pages), falls back to /api/skills (local server)
async function loadData() {
  // Try static snapshot
  try {
    const res = await fetch('./data.json');
    if (res.ok) {
      const json = await res.json();
      // Support both { skills: [...], exported_at: ... } and plain array
      if (Array.isArray(json)) return { skills: json, exported_at: null };
      return json;
    }
  } catch {}
  // Fallback: local dev server
  try {
    const res = await fetch('/api/skills');
    if (res.ok) return { skills: await res.json(), exported_at: null };
  } catch {}
  return { skills: [], exported_at: null };
}

function updateStats(data, exportedAt) {
  const skills = data;
  document.getElementById('stat-total').textContent = skills.length;
  document.getElementById('stat-loaded').textContent = skills.filter(d => d.loaded).length;
  document.getElementById('stat-uses').textContent = skills.reduce((s, d) => s + (d.usage_count || 0), 0);
  document.getElementById('empty').style.display = skills.length === 0 ? 'flex' : 'none';
  if (exportedAt) {
    const d = new Date(exportedAt);
    document.getElementById('last-updated').textContent =
      'snapshot: ' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }
}

// ── Bubble math ───────────────────────────────────────────────────────────────
const MIN_R = 32, MAX_R = 110;

function calcRadius(usage, maxUsage) {
  if (maxUsage === 0) return MIN_R;
  const ratio = Math.log1p(usage) / Math.log1p(maxUsage);
  return MIN_R + ratio * (MAX_R - MIN_R);
}

// ── Layout / physics ──────────────────────────────────────────────────────────
function initPositions() {
  for (const b of bubbles) {
    if (b.x === undefined) {
      b.x = b.r + Math.random() * (W - b.r * 2);
      b.y = b.r + Math.random() * (H - b.r * 2);
      b.vx = (Math.random() - .5) * 1.5;
      b.vy = (Math.random() - .5) * 1.5;
    }
  }
}

function physics() {
  const damp = 0.86, repulse = 1.3;
  for (let i = 0; i < bubbles.length; i++) {
    const a = bubbles[i];
    a.vx += (W / 2 - a.x) * 0.0018;
    a.vy += (H / 2 - a.y) * 0.0018;
    for (let j = i + 1; j < bubbles.length; j++) {
      const b = bubbles[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const minD = a.r + b.r + 14;
      if (dist < minD) {
        const f = (minD - dist) / minD * repulse;
        const fx = (dx / dist) * f, fy = (dy / dist) * f;
        a.vx -= fx; a.vy -= fy; b.vx += fx; b.vy += fy;
      }
    }
    a.vx *= damp; a.vy *= damp;
    a.x += a.vx;  a.y += a.vy;
    const m = a.r + 4;
    if (a.x < m) { a.x = m; a.vx *= -.5; }
    if (a.x > W - m) { a.x = W - m; a.vx *= -.5; }
    if (a.y < m) { a.y = m; a.vy *= -.5; }
    if (a.y > H - m) { a.y = H - m; a.vy *= -.5; }
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
const PAL_LOADED = ['#4ecdc4', '#7c6af7', '#4ecdc4'];
const PAL_IDLE   = ['#3a3a58', '#2e2e46', '#3a3a58'];
const PAL_HOVER  = ['#ff6b9d', '#f9c74f', '#ff6b9d'];

function grad(b, isHover) {
  const g = ctx.createRadialGradient(b.x - b.r * .3, b.y - b.r * .3, 0, b.x, b.y, b.r);
  const p = isHover ? PAL_HOVER : (b.loaded ? PAL_LOADED : PAL_IDLE);
  g.addColorStop(0, p[0] + 'cc');
  g.addColorStop(.6, p[1] + '88');
  g.addColorStop(1, p[2] + '33');
  return g;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Connections between loaded bubbles
  const loaded = bubbles.filter(b => b.loaded);
  ctx.save();
  ctx.strokeStyle = '#4ecdc420';
  ctx.lineWidth = 1;
  for (let i = 0; i < loaded.length; i++)
    for (let j = i + 1; j < loaded.length; j++) {
      const [a, b] = [loaded[i], loaded[j]];
      if (Math.hypot(b.x - a.x, b.y - a.y) < 300) {
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
    }
  ctx.restore();

  for (const b of bubbles) {
    const isHover = b === hovered;
    const pulse = b.loaded ? 1 + Math.sin(Date.now() / 1000 + b._phase) * 0.022 : 1;
    const r = b.r * (isHover ? 1.13 : pulse);

    // Glow
    if (b.loaded || isHover) {
      ctx.save();
      ctx.shadowColor = isHover ? '#ff6b9d' : '#4ecdc4';
      ctx.shadowBlur  = isHover ? 32 : 20;
      ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'transparent'; ctx.fill();
      ctx.restore();
    }

    // Fill
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad(b, isHover); ctx.fill();

    // Rim
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = (isHover ? '#ff6b9d' : b.loaded ? '#4ecdc4' : '#4a4a6a') + '88';
    ctx.lineWidth = isHover ? 2 : 1; ctx.stroke();

    // Shine
    ctx.save();
    ctx.beginPath(); ctx.arc(b.x - r * .28, b.y - r * .28, r * .18, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff22'; ctx.fill(); ctx.restore();

    // Label
    const fs = Math.max(10, Math.min(14, r * .38));
    ctx.font = `600 ${fs}px SF Mono, Fira Code, monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = b.loaded ? '#e8fffe' : '#8888aa';
    ctx.save();
    ctx.beginPath(); ctx.arc(b.x, b.y, r - 4, 0, Math.PI * 2); ctx.clip();
    ctx.fillText(b.name, b.x, b.y);
    ctx.restore();

    // Usage badge
    if (b.usage_count > 0) {
      const bx = b.x + r * .65, by = b.y - r * .65;
      ctx.beginPath(); ctx.arc(bx, by, 9, 0, Math.PI * 2);
      ctx.fillStyle = '#7c6af7'; ctx.fill();
      ctx.font = 'bold 8px monospace';
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(b.usage_count > 99 ? '99+' : String(b.usage_count), bx, by);
    }
  }
}

function loop() { physics(); draw(); requestAnimationFrame(loop); }

// ── Tooltip ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  hovered = bubbles.find(b => Math.hypot(b.x - mx, b.y - my) < b.r) || null;
  if (hovered) {
    const b = hovered;
    const tags = (b.tags || []).map(t => `<span class="t-tag">${t}</span>`).join('') || '—';
    tooltip.innerHTML = `
      <div class="t-name">${b.name}</div>
      <div>${b.description || '<span class="t-dim">no description</span>'}</div>
      <div style="margin-top:6px">${tags}</div>
      <div style="margin-top:8px" class="t-dim">Uses: <b style="color:#f9c74f">${b.usage_count}</b></div>
      ${b.loaded ? '<div class="t-loaded">⚡ active</div>' : ''}
    `;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.classList.add('show');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('show');
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => { hovered = null; tooltip.classList.remove('show'); });

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  resize();
  const { skills, exported_at } = await loadData();
  updateStats(skills, exported_at);

  const maxUsage = Math.max(...skills.map(s => s.usage_count || 0), 0);
  bubbles = skills.map((d, i) => ({
    ...d,
    usage_count: d.usage_count || 0,
    tags: d.tags || [],
    r: calcRadius(d.usage_count || 0, maxUsage),
    _phase: i * 1.3,
  }));

  initPositions();
  loop();

  // Show panel toggle only when running on local dev server
  if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
    document.getElementById('panel-toggle').style.display = 'flex';
  }
})();

// ── Discover panel ────────────────────────────────────────────────────────────

function showPanel(panel) {
  const isDiscover = panel === 'discover';
  document.getElementById('c').style.display = isDiscover ? 'none' : 'block';
  document.querySelector('.legend').style.display = isDiscover ? 'none' : 'flex';
  document.querySelector('.controls').style.display = isDiscover ? 'none' : 'flex';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('discover-panel').style.display = isDiscover ? 'block' : 'none';
  document.getElementById('btn-my').classList.toggle('active', !isDiscover);
  document.getElementById('btn-discover').classList.toggle('active', isDiscover);
  if (isDiscover) loadHubSkills();
}

async function loadHubSkills() {
  const loading = document.getElementById('discover-loading');
  const errorEl = document.getElementById('discover-error');
  const list = document.getElementById('discover-list');
  loading.style.display = 'block';
  errorEl.style.display = 'none';
  list.innerHTML = '';

  try {
    const res = await fetch('/api/hubs/skills');
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const skills = await res.json();
    loading.style.display = 'none';
    if (!skills.length) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:40px 0;text-align:center">No hub skills found. Register a hub with: <code style="color:var(--accent)">sb hub add &lt;url&gt;</code></div>';
      return;
    }
    list.innerHTML = skills.map(s => renderSkillCard(s)).join('');
  } catch (err) {
    loading.style.display = 'none';
    errorEl.textContent = 'Failed to load hub skills: ' + err.message;
    errorEl.style.display = 'block';
  }
}

function renderSkillCard(s) {
  const tags = (s.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('');
  const btnClass = s.installed ? 'install-btn installed' : 'install-btn';
  const btnLabel = s.installed ? '✓ Installed' : 'Install';
  const btnDisabled = s.installed ? 'disabled' : '';
  const btnId = `install-btn-${s.hub}-${s.name}`.replace(/[^a-z0-9-]/gi, '_');
  return `
    <div class="skill-card">
      <div class="card-name">${s.name}</div>
      <div class="card-hub">hub: ${s.hub || ''}</div>
      <div class="card-desc">${s.description || '<span style="color:var(--text-dim)">No description</span>'}</div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      <div class="card-footer">
        <span style="font-size:11px;color:var(--text-dim)">Uses: ${s.usage_count || 0}</span>
        <button id="${btnId}" class="${btnClass}" ${btnDisabled}
          onclick="installSkill('${s.name}', '${s.hub || ''}', '${btnId}')">
          ${btnLabel}
        </button>
      </div>
    </div>
  `;
}

async function installSkill(name, hub, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Installing…';
  try {
    const res = await fetch('/api/install', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, hub }),
    });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✓ Installed';
      btn.className = 'install-btn installed';
    } else {
      btn.textContent = 'Install';
      btn.disabled = false;
      alert('Install failed: ' + (data.error || 'unknown error'));
    }
  } catch (err) {
    btn.textContent = 'Install';
    btn.disabled = false;
    alert('Install failed: ' + err.message);
  }
}
</script>
</body>
</html>
